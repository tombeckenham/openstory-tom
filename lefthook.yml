# EXAMPLE USAGE:
#
#   Refer for explanation to following link:
#   https://lefthook.dev/configuration/
#

pre-commit:
  commands:
    lint:
      glob: '*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx}'
      exclude:
        - src/routeTree.gen.ts
        - public/mockServiceWorker.js
      # Filter staged files against .oxlintrc.json's ignorePatterns
      # before invoking oxlint — when every staged file is ignored by
      # oxlint config, oxlint itself exits "no files to lint" + 1. The
      # awk pipeline drops src/components/ui/* (matching .oxlintrc), and
      # the surrounding `[ -n ... ] && ... || true` skips the run when
      # nothing remains.
      run: |
        filtered=$(printf '%s\n' {staged_files} | awk '!/^src\/components\/ui\//')
        [ -n "$filtered" ] && bun run --bun oxlint --type-aware --quiet $filtered || true
      stage_fixed: true
    format:
      glob: '*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,sql,json,md}'
      exclude:
        - src/routeTree.gen.ts
        - public/mockServiceWorker.js
      run: bun run --bun oxfmt --write {staged_files}
      stage_fixed: true
    typecheck:
      glob: '*.{ts,tsx,mts,cts}'
      run: bun run --bun tsgo --noEmit
      stage_fixed: true
    migration-safety:
      glob: 'drizzle/migrations/**/*.sql'
      run: bun scripts/check-migrations.ts {staged_files}
    workflow-trigger-safety:
      glob: '.github/workflows/*.{yml,yaml}'
      run: |
        violations=0
        for wf in {staged_files}; do
          block=$(awk '/^["'"'"']?on["'"'"']?[[:space:]]*:/{flag=1; print; next} flag && /^[a-zA-Z"'"'"']/{flag=0} flag' "$wf")
          if [ -z "$block" ]; then
            echo "ERROR $wf: could not locate top-level 'on:' block — unsupported YAML format"
            violations=$((violations + 1))
            continue
          fi
          if printf '%s\n' "$block" | sed 's/[[:space:]]*#.*$//' | grep -q 'pull_request_target'; then
            echo "ERROR $wf: pull_request_target trigger is not allowed in this repo."
            violations=$((violations + 1))
          fi
        done
        if [ "$violations" -gt 0 ]; then
          echo 'It runs base-branch workflow code with secrets in the context of fork PRs.'
          echo 'See https://securitylab.github.com/research/github-actions-preventing-pwn-requests/'
          exit 1
        fi
